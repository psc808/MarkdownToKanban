<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kanban</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <div class="topbar-left">
      <span class="app-logo">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 100 100" fill="#000000">
          <rect x="10" y="10" width="80" height="18" rx="4"/>
          <rect x="41" y="28" width="18" height="62" rx="4"/>
        </svg>
      </span>
      <span class="topbar-title">Markdown to Kanban</span>
      <span id="task-count" class="task-count"></span>
    </div>
    <div class="topbar-right">
      <select id="category-filter" class="sort-select" title="Filter by category">
        <option value="">All categories</option>
      </select>
      <select id="sort-select" class="sort-select" title="Sort cards within columns">
        <option value="creation">By Creation (latest first)</option>
        <option value="duedate">By Due Date (earliest first)</option>
        <option value="custom">Custom</option>
      </select>
      <button id="theme-btn" class="icon-btn" title="Toggle dark mode">🌙</button>
      <button id="settings-btn" class="icon-btn" title="Settings">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
      <button id="refresh-btn" class="refresh-btn">Refresh</button>
    </div>
  </header>

  <main id="board" class="board"></main>

  <div id="done-checkmark" aria-hidden="true">
    <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
      <rect class="check-circle" x="0" y="0" width="32" height="32" rx="6" ry="6"/>
      <polyline class="check-tick" points="8,17 13,22 24,11"/>
    </svg>
    <span class="spark"></span>
    <span class="spark"></span>
    <span class="spark"></span>
    <span class="spark"></span>
    <span class="spark"></span>
    <span class="spark"></span>
    <span class="spark"></span>
    <span class="spark"></span>
  </div>

  <script>if (typeof window.electronAPI !== 'undefined') document.body.classList.add('electron');</script>
  <script src="app.js"></script>
</body>
</html>
